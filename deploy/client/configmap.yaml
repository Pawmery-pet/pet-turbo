apiVersion: v1
kind: ConfigMap
metadata:
  name: pawmery-config
  labels:
    app: pawmery-client
    component: config
data:
  NODE_ENV: "production"
  PORT: "3000"
  NEXTAUTH_URL: "https://pawmery.com"
  API_BASE_URL: "https://api.pawmery.com/v1"
  DATABASE_URL: "postgresql://pawmery:password@pawmery-db:5432/pawmery"
  REDIS_URL: "redis://pawmery-redis:6379"
  # Application specific configuration
  APP_NAME: "Pawmery - Pet Management System"
  APP_VERSION: "1.0.0"
  SUPPORT_EMAIL: "support@pawmery.com"
  # Feature flags
  FEATURE_NOTIFICATIONS: "true"
  FEATURE_ANALYTICS: "true"
  FEATURE_BETA_FEATURES: "false"
  # Logging configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  # Cache configuration
  CACHE_TTL: "3600"
  # Upload configuration
  MAX_FILE_SIZE: "10485760"  # 10MB
  ALLOWED_FILE_TYPES: "image/jpeg,image/png,image/gif,image/webp"
