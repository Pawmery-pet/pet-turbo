version: "3.8"

services:
  golden-retriever:
    build:
      context: ../..
      dockerfile: apps/golden-retriever/Dockerfile
    image: golden-retriever:latest
    container_name: golden-retriever
    ports:
      - "3020:3020"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3020/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - golden-retriever-network

networks:
  golden-retriever-network:
    driver: bridge
