on:
  push:
    tags:
      - '*-dev-*'

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.meta.outputs.app }}
      env: ${{ steps.meta.outputs.env }}
      commit-hash: ${{ steps.meta.outputs.commit_hash }}
    steps:
      - name: Extract Meta Info
        id: meta
        run: |
          APP=$(echo '${{ github.ref }}' | sed -E 's/refs\/tags\/(.+)-(dev|prod)-(.+)/\1/')
          echo "App: $APP"
          ENV=$(echo '${{ github.ref }}' | sed -E 's/refs\/tags\/(.+)-(dev|prod)-(.+)/\2/')
          echo "Environment: $ENV"
          COMMIT_HASH=$(echo '${{ github.ref }}' | sed -E 's/refs\/tags\/(.+)-(dev|prod)-(.+)/\3/')
          echo "COMMIT_HASH: $COMMIT_HASH"
          
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$COMMIT_HASH" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: meta
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Extract Meta Info
        run: |
          echo "App: ${{ needs.meta.outputs.app }}"
          echo "Environment: ${{ needs.meta.outputs.env }}"
          echo "Commit Hash: ${{ needs.meta.outputs.commit-hash }}"

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.AWS_ECR_REGISTRY }}
          username: ${{ secrets.AWC_ECR_USER_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_ECR_USER_ACCESS_KEY_SECRET }}
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          push: true
          file: apps/${{ needs.meta.outputs.app }}/Dockerfile
          tags: ${{ vars.AWS_ECR_REPO }}/${{ needs.meta.outputs.app }}:${{ needs.meta.outputs.commit-hash }}
