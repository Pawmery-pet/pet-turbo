name: Update Cache

on:
    workflow_dispatch:
    push:
        branches:
            - develop
        paths:
            - "pnpm-lock.yaml"

jobs:
    cache:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile